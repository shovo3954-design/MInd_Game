<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MInd_Game</title>

    <!--logo-->
    <link rel="shortcut icon" href="assets/vendore/texllate/img/Brain_Tree.webp" type="image/x-icon">

    <!--Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!--Bootstrap Icons-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">    

    <!-- Particle js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/modernizr/2.8.3/modernizr.min.js"
    type="text/javascript"></script>

    <!--Linking style.css-->
    <link rel="stylesheet" href="assets/vendore/texllate/animate.css">

    <!--Linking textillate-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <section id="Oval" class="md-4">

            <div class="col-mb-1"></div>
            <div class="col-mb-10">
                <div class="d-flex justify-content-center align-items-center" style="height:80vh">

                    <canvas id="canvasOne" width="700" height="420" style="position:absolute"></canvas>

                    <div class="jarvisHood">
                        <div class="square">
                            <span class="circle"></span>
                            <span class="circle"></span>
                            <span class="circle"></span>
                        </div>
                    </div>

                </div>

                <h5 class="text-light text text-center">ask me anything.</h5>

                <div class="col-md-12 mt-4 pt-4">
                    <div class="text-center">
                        <div id="TextInput" class="d-flex">

                            <input type="text" class="input-field" name="chatbox" id="chatbox" placeholder="Type here...">

                            <button id="MicBtm" class="glow-on-hover"><i class="bi bi-mic"></i></button>
                            <button id="ChateBtm" class="glow-on-hover"><i class="bi bi-chat-fill"></i></button>
                            <button id="SettingBtm" class="glow-on-hover"><i class="bi bi-gear-wide-connected"></i></button>

                        </div>
                    </div>
                </div>

            </div>
            <div class="col-mb-1"></div>

        </section>

        <section id="SiriWave" class="mb-4" hidden>
            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="d-flex justify-content-center align-items-center" style="height:100vh">
                            <div class="">
                                <p class="text-start text-light mb-4 siri-message">I am a chatbot which acts like human.</p>
                                <div id="siri-container">

                                    <!-- PASTE HERE -->
                                    <svg width="300" height="150" viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
                                        <rect width="300" height="150" fill="#000"/>
                                        <path fill="none" stroke="rgba(0,199,255,0.9)" stroke-width="2">
                                            <animate attributeName="d" dur="3s" repeatCount="indefinite"
                                                values="
                                                    M0,75 Q37,50 75,75 Q112,100 150,75 Q187,50 225,75 Q262,100 300,75;
                                                    M0,75 Q37,100 75,75 Q112,50 150,75 Q187,100 225,75 Q262,50 300,75;
                                                    M0,75 Q37,50 75,75 Q112,100 150,75 Q187,50 225,75 Q262,100 300,75"/>
                                        </path>
                                        <path fill="none" stroke="rgba(150,80,255,0.6)" stroke-width="2">
                                            <animate attributeName="d" dur="2s" repeatCount="indefinite"
                                                values="
                                                    M0,75 Q37,57 75,75 Q112,93 150,75 Q187,57 225,75 Q262,93 300,75;
                                                    M0,75 Q37,93 75,75 Q112,57 150,75 Q187,93 225,75 Q262,57 300,75;
                                                    M0,75 Q37,57 75,75 Q112,93 150,75 Q187,57 225,75 Q262,93 300,75"/>
                                        </path>
                                        <path fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5">
                                            <animate attributeName="d" dur="4s" repeatCount="indefinite"
                                                values="
                                                    M0,75 Q37,63 75,75 Q112,87 150,75 Q187,63 225,75 Q262,87 300,75;
                                                    M0,75 Q37,87 75,75 Q112,63 150,75 Q187,87 225,75 Q262,63 300,75;
                                                    M0,75 Q37,63 75,75 Q112,87 150,75 Q187,63 225,75 Q262,87 300,75"/>
                                        </path>
                                    </svg>
                                    <!-- END -->

                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!--JQuary-->
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

    <!--Bootstrap-->

     <!--Bootstrap-->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

     <!--Particle js-->
     <script src='https://cdnjs.cloudflare.com/ajax/libs/jquery/2.1.3/jquery.min.js'></script>
     <script src='https://ajax.googleapis.com/ajax/libs/jqueryui/1.11.2/jquery-ui.min.js'></script>
     <script src="script.js"></script>

     <!--Siri Wave-->

    <!--textillate js-->

     <script src="http://jschr.github.io/textillate/jquery.textillate.js"></script>

    <!--main.js-->
     <script src="main.js"></script>

    <!--connecting eel-->
    <script src="/eel.js"></script>

    <!--Controller.js-->
     <script src="controller.js"></script>
